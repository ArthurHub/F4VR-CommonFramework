[MyMod]
#
# ---------------
# Live Reload:
# Any change to the file while the game is running will be detected and applied immediately.
# Useful to modify advanced settings and seeing the effects without restarting the game.
#
# ---------------------
# Input Binding Format:
# Controller bindings are a single, case-insensitive line:
#   "<hand> <type> <button> [duration] [+[hand:]modifier]"
#
#   hand     = primary | offhand | left | right
#   type     = tap | press | release | longpress | double | hold | touch | axis
#   button   = trigger | grip | a | b (menu) | thumbstick | system
#   duration = optional seconds; meaning depends on type (e.g. longpress hold threshold)
#   modifier = optional button held while the binding fires:
#              "+grip" on the same hand, or "+offhand:grip" on a specific hand
#
# Disable a binding with "none", "off", "disabled", or an empty value -> it never fires.
#
# Examples:
#   offhand tap grip             -> quick press+release of the offhand grip
#   primary longpress a 0.6      -> hold the primary A button for 0.6s
#   primary press trigger +grip  -> press trigger while holding grip on the same hand
#   none                         -> binding disabled (never fires)

fMyConfigValue = 3.0


[Debug]

# The level of log message to output; 2 - info (basic), 1 - debug (more logs), 0 - trace (A LOT of logs)
iLogLevel = 2

# The pattern and data in each log messages (default: "%H:%M:%S.%e %L: %v")
# Additional options: %s:%# for source file and line number. Example: "%H:%M:%S.%e %L [%-25s:%-4#]: %v"
sLogPattern = %H:%M:%S.%e %l: %v

# General usage debug flag to enable/disable code paths at runtime (use in combination with ReloadConfigInterval)
fDebugFlowFlag1 = 0
fDebugFlowFlag2 = 0
fDebugFlowFlag3 = 0
sDebugFlowText1 =
sDebugFlowText2 =

# In-game DebugAdjuster target. When non-none, controller input mutates the selected value live.
# Values: none | flag123 | transform | handpose | flag1 | flag2 | flag3 | haptictest
#   ...or a "Section::Key" reference to tune ANY INI field live, e.g. MyMod::tSomeTransform
# Bindings (target=transform): primary stick = translate XY, secondary stick Y = translate Z;
#   hold offhand-grip for rotate; hold offhand-A for scale.
# Bindings (target=handpose): one slot active at a time (finger or palm).
#   Active finger: primary X=prox, primary Y=mid, secondary X=dist, secondary Y=splay.
#   Active palm:   primary X=palmPitch, primary Y=palmYaw.
#   Offhand-X short release: advance slot (thumb->index->middle->ring->pinky->palm-->thumb).
# Bindings (target=flag123): primary X = flag1, primary Y = flag2, secondary Y = flag3.
# Bindings (target=haptictest): Primary-A tap plays the HapticSegment sequence in sDebugFlowText1
#   on the primary controller. Format: ';'-separated segments "duration,startIntensity,endIntensity"
#   (seconds, 0..1, 0..1), e.g. sDebugFlowText1 = 0.4,0.1,1.0; 0.1,0,0; 0.05,1,1
# Primary-A short tap = save to INI; Primary-A long press = reload from INI (except target=haptictest).
sDebugAdjustTarget = none

# Dump specific data into logs by name
# Names: ui_tree, skelly, fp_skelly, geometry, world, all_nodes
sDebugDumpDataOnceNames =

# Bulk-add game items to the player inventory by category (once, for testing).
# Comma-separated; the FIRST token is the operation, the rest are "category[:filter]" tokens.
# Operation (required first token):
#   get        add items the player can actually get: reachable from a leveled list (vendor/loot/container
#              drops) or produced by a crafting recipe (misses uniques/quest rewards)
#   get-all    add every named/playable item, including non-obtainable ones
#   print      dry-run of get: log each obtainable match instead of adding it
#   print-all  dry-run of get-all: log every match. Print logs FormID, editor ID, name, source plugin,
#              keywords, and for armor its slots + weight class.
# Categories: weapons, throwables, ammo, armor, aid, misc. Count is 50 for ammo, 5 for throwables, 1 otherwise.
# Filter is a '|'-separated list of "key=value" clauses, AND-ed together:
#   name=<substr>     name substring, case-insensitive (any category)
#   keyword=<substr>  keyword editor-ID substring (any category), e.g. keyword=laser picks laser weapons
#   slot=<list>       armor body slot(s): '+'-separated aliases (torso/head/legs/arms/...) or CK numbers 30-61
#   class=<value>     armor weight class (light|heavy|none) or weapon type (melee|gun|unarmed)
# A clause with no '=' is shorthand for name=, so "weapons:laser" == "weapons:name=laser".
# Examples:  get, weapons, throwables  |  get-all, weapons:class=gun|keyword=laser  |  print-all, armor:slot=torso|class=heavy
sDebugAddItemsOnceNames =

# Internal use for versioning
iVersion = 1
