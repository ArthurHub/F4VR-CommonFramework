[MyMod]

fMyConfigValue = 3.0


[Debug]

# The level of log message to output; 2 - info (basic), 1 - debug (more logs), 0 - trace (A LOT of logs)
iLogLevel = 2

# The pattern and data in each log messages (default: "%H:%M:%S.%e %L: %v")
# Additional options: %s:%# for source file and line number. Example: "%H:%M:%S.%e %L [%-25s:%-4#]: %v"
sLogPattern = %H:%M:%S.%e %l: %v

# General usage debug flag to enable/disable code paths at runtime (use in combination with ReloadConfigInterval)
fDebugFlowFlag1 = 0
fDebugFlowFlag2 = 0
fDebugFlowFlag3 = 0
sDebugFlowText1 =
sDebugFlowText2 =

# General usage debug transform (translate;heading,roll,attitude in degrees;scale) for tuning at runtime via live-reload
tDebugTransform = 0,0,0;0,0,0;1

# In-game DebugAdjuster target. When non-none, controller input mutates the selected value live.
# Values: none | flag123 | transform | flag1 | flag2 | flag3
# Bindings (target=transform): primary stick = translate XY, secondary stick Y = translate Z;
#   hold offhand-grip for rotate; hold offhand-X for scale.
# Bindings (target=flag123): primary X = flag1, primary Y = flag2, secondary Y = flag3.
# Primary-A short tap = save to INI; Primary-A long press = reload from INI.
sDebugAdjustTarget = none

# Dump specific data into logs by name
# Names: ui_tree, skelly, fp_skelly, geometry, world, all_nodes
sDebugDumpDataOnceNames =

# Internal use for versioning
iVersion = 1
