[MyMod]
#
# ---------------
# Live Reload:
# Any change to the file while the game is running will be detected and applied immediately.
# Useful to modify advanced settings and seeing the effects without restarting the game.
#
# ---------------------
# Input Binding Format:
# Controller bindings are a single, case-insensitive line: "<hand> <type> <button> [duration] [+modifier]".
# Examples: "none"; "offhand tap grip"; "primary longpress A"; "primary press trigger +grip".
# Guide: https://github.com/ArthurHub/F4VR-CommonFramework/blob/main/docs/input-binding.md

fMyConfigValue = 3.0


[Debug]

# The level of log message to output; 2 - info (basic), 1 - debug (more logs), 0 - trace (A LOT of logs)
iLogLevel = 2

# Sets the spdlog output pattern for each normal log message.
# Examples: "%H:%M:%S.%e %l: %v"; "%H:%M:%S %L [%s:%#]: %v"
# Guide: https://github.com/ArthurHub/F4VR-CommonFramework/blob/main/docs/debug-config.md
sLogPattern = %H:%M:%S.%e %l: %v

# Mod-defined numeric scratch values for runtime experiments; blank values load as 0.
fFlowFlag1 = 0
fFlowFlag2 = 0
fFlowFlag3 = 0
# Mod-defined text scratch values; sFlowText1 also supplies haptictest sequences.
sFlowText1 =
sFlowText2 =

# Selects an in-game live-tuning target; none or blank disables it and restores controller input.
# Examples: flag123; haptictest; MyMod::tSomeTransform
# Guide: https://github.com/ArthurHub/F4VR-CommonFramework/blob/main/docs/debug-config.md
sAdjustTarget = none

# Writes named game-state dumps to the mod log and removes each name after it runs.
# Examples: ui_tree; skelly, fp_skelly; geometry, pipboy, all_nodes
# Guide: https://github.com/ArthurHub/F4VR-CommonFramework/blob/main/docs/debug-config.md
sDumpDataOnceNames =

# Runs a one-shot inventory add or dry run from an operation plus category filters.
# Examples: get, weapons, throwables; print, weapons:laser; print-all, armor:slot=torso|class=heavy
# Guide: https://github.com/ArthurHub/F4VR-CommonFramework/blob/main/docs/debug-config.md
sAddItemsOnceNames =

# Internal use for versioning
iVersion = 1
